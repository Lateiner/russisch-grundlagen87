<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Memory (2, 3, 4)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --bg-color: #f4f7f9;
            --card-back: #34495e;
            /* Paar-Farben für die Lösung */
            --color-p1: #ffadad;
            --color-p2: #ffd6a5;
            --color-p3: #fdffb6;
            --color-p4: #caffbf;
            --color-p5: #9bf6ff;
            --color-p6: #a0c4ff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .header { text-align: center; margin-bottom: 10px; }
        .stats { margin-bottom: 15px; font-weight: bold; }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        @media (min-width: 450px) {
            .memory-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .memory-card {
            aspect-ratio: 3 / 4;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s, opacity 0.5s;
            user-select: none;
        }

        .memory-card.flipped { transform: rotateY(180deg); }

        /* Wenn ein Paar im Spiel gefunden wurde, verschwindet es */
        .memory-card.matched-hidden {
            opacity: 0;
            pointer-events: none;
            cursor: default;
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 8px;
            padding: 5px;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .card-front {
            background-color: white;
            transform: rotateY(180deg);
            border: 2px solid var(--accent-color);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .card-front.digit { font-size: 2.5rem; color: var(--accent-color); }

        .card-back {
            background-color: var(--card-back);
            color: white;
            font-size: 2rem;
        }

        /* Klassen für die farbige Lösung */
        .sol-1 { background-color: var(--color-p1) !important; }
        .sol-2 { background-color: var(--color-p2) !important; }
        .sol-3 { background-color: var(--color-p3) !important; }
        .sol-4 { background-color: var(--color-p4) !important; }
        .sol-5 { background-color: var(--color-p5) !important; }
        .sol-6 { background-color: var(--color-p6) !important; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        #solve-btn { background-color: #7f8c8d; }
        #reset-btn { background-color: var(--accent-color); }

        #message {
            margin-top: 15px;
            font-weight: bold;
            color: var(--success-color);
            height: 24px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Paare finden</h1>
        <div class="stats">Paare: <span id="pairs-count">0</span> / 6</div>
    </div>

    <div class="memory-grid" id="grid"></div>

    <div id="message"></div>

    <div class="controls">
        <button id="solve-btn" onclick="showSolution()">Lösung anzeigen</button>
        <button id="reset-btn" onclick="resetGame()">Neu starten</button>
    </div>

    <script>
        const cardData = [
            { id: 1, digit: "2", word: "две книги" },
            { id: 2, digit: "2", word: "два стула" },
            { id: 3, digit: "3", word: "три окна" },
            { id: 4, digit: "3", word: "три билета" },
            { id: 5, digit: "4", word: "четыре ручки" },
            { id: 6, digit: "4", word: "четыре яблока" }
        ];

        let flippedCards = [];
        let matchedPairs = 0;
        let lockBoard = false;
        let isSolvedMode = false;

        function initGame() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            lockBoard = false;
            isSolvedMode = false;
            document.getElementById('pairs-count').textContent = '0';
            document.getElementById('message').textContent = '';
            document.getElementById('solve-btn').disabled = false;
            document.getElementById('solve-btn').style.opacity = '1';

            let deck = [];
            cardData.forEach(item => {
                deck.push({ id: item.id, content: item.digit, type: 'digit' });
                deck.push({ id: item.id, content: item.word, type: 'word' });
            });

            deck.sort(() => Math.random() - 0.5);

            deck.forEach((data) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.pairId = data.id;

                card.innerHTML = `
                    <div class="card-face card-back">?</div>
                    <div class="card-face card-front ${data.type === 'digit' ? 'digit' : ''}">${data.content}</div>
                `;

                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard || isSolvedMode || card.classList.contains('flipped') || card.classList.contains('matched-hidden')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.pairId === card2.dataset.pairId;

            if (isMatch) {
                matchedPairs++;
                document.getElementById('pairs-count').textContent = matchedPairs;
                lockBoard = true;
                
                // Paar verschwinden lassen
                setTimeout(() => {
                    card1.classList.add('matched-hidden');
                    card2.classList.add('matched-hidden');
                    flippedCards = [];
                    lockBoard = false;
                    if (matchedPairs === 6) {
                        document.getElementById('message').textContent = "Gut gemacht! Alle Paare gefunden.";
                    }
                }, 700);
            } else {
                lockBoard = true;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    lockBoard = false;
                }, 1000);
            }
        }

        function showSolution() {
            isSolvedMode = true;
            lockBoard = true;
            document.getElementById('solve-btn').disabled = true;
            document.getElementById('solve-btn').style.opacity = '0.5';
            document.getElementById('message').textContent = "Lösung wird angezeigt (farblich sortiert).";

            const allCards = document.querySelectorAll('.memory-card');
            allCards.forEach(card => {
                // Falls Karte versteckt war, wieder anzeigen
                card.classList.remove('matched-hidden');
                card.classList.add('flipped');
                
                // Farbe basierend auf ID zuweisen
                const pairId = card.dataset.pairId;
                const frontFace = card.querySelector('.card-front');
                frontFace.classList.add(`sol-${pairId}`);
                
                // Klick-Events entfernen
                card.onclick = null;
            });
        }

        function resetGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>
