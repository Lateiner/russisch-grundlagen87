<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Bild-Wort-Matching</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 { font-size: 1.4rem; margin-bottom: 10px; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .image-display {
            font-size: 80px;
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            min-width: 120px;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-btn {
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: #f0f7ff;
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            border-color: var(--error-color) !important;
            color: white;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 10px;
        }

        .control-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        #solve-btn { background-color: #6c757d; }
        #next-btn { background-color: var(--accent-color); display: none; }
        #reset-btn { background-color: var(--primary-color); display: none; }

        #feedback {
            margin-top: 15px;
            font-weight: bold;
            height: 24px;
        }

        /* Ergebnis-Ansicht */
        #result-screen { display: none; }
        .score-text { font-size: 2rem; color: var(--accent-color); margin: 20px 0; }

        @media (max-width: 480px) {
            .quiz-container { padding: 20px; }
            .option-btn { font-size: 1.1rem; padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div id="quiz-ui">
            <h1>Was ist richtig?</h1>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>

            <div class="image-display" id="current-image">📖</div>
            
            <div class="options-grid" id="options-grid"></div>

            <div id="feedback"></div>

            <div class="controls">
                <button id="solve-btn" class="control-btn" onclick="showSolution()">Lösung</button>
                <button id="next-btn" class="control-btn" onclick="nextQuestion()">Weiter</button>
            </div>
        </div>

        <div id="result-screen">
            <h1>Ergebnis</h1>
            <p>Du hast die Übung beendet!</p>
            <div class="score-text" id="final-score">0 / 10</div>
            <button id="reset-btn-final" class="control-btn" style="background-color: var(--primary-color);" onclick="resetQuiz()">Neu starten</button>
        </div>
    </div>

    <script>
        const questions = [
            { image: "📖", word: "книга", correct: "одна книга" },
            { image: "🪑", word: "стул", correct: "один стул" },
            { image: "🪟", word: "окно", correct: "одно окно" },
            { image: "🍎", word: "яблоко", correct: "одно яблоко" },
            { image: "👜", word: "сумка", correct: "одна сумка" },
            { image: "📱", word: "телефон", correct: "один телефон" },
            { image: "📝", word: "задание", correct: "одно задание" },
            { image: "🖋️", word: "ручка", correct: "одна ручка" },
            { image: "🏙️", word: "город", correct: "один город" },
            { image: "🎓", word: "урок", correct: "один урок" }
        ];

        let currentIndex = 0;
        let score = 0;
        let answered = false;
        let firstTry = true;

        function loadQuestion() {
            answered = false;
            firstTry = true;
            const q = questions[currentIndex];
            document.getElementById('current-image').textContent = q.image;
            document.getElementById('feedback').textContent = "";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('solve-btn').style.display = "inline-block";
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";

            const options = [
                `один ${q.word}`,
                `одна ${q.word}`,
                `одно ${q.word}`
            ];

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(btn, opt);
                grid.appendChild(btn);
            });

            updateProgress();
        }

        function checkAnswer(btn, choice) {
            if (answered) return;
            
            const q = questions[currentIndex];

            if (choice === q.correct) {
                answered = true;
                btn.classList.add('correct');
                if (firstTry) score++;
                
                document.getElementById('feedback').textContent = "Richtig!";
                document.getElementById('feedback').style.color = "var(--success-color)";
                document.getElementById('solve-btn').style.display = "none";
                document.getElementById('next-btn').style.display = "inline-block";
                
                // Alle anderen Buttons deaktivieren
                document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            } else {
                btn.classList.add('wrong');
                btn.disabled = true;
                firstTry = false;
                document.getElementById('feedback').textContent = "Versuche es noch einmal!";
                document.getElementById('feedback').style.color = "var(--error-color)";
            }
        }

        function showSolution() {
            const q = questions[currentIndex];
            firstTry = false; // Keine Punkte mehr für diese Frage
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                if (btn.textContent === q.correct) {
                    btn.classList.add('correct');
                }
                btn.disabled = true;
            });

            answered = true;
            document.getElementById('solve-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "inline-block";
            document.getElementById('feedback').textContent = "Lösung: " + q.correct;
            document.getElementById('feedback').style.color = "var(--primary-color)";
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-ui').style.display = "none";
            document.getElementById('result-screen').style.display = "block";
            document.getElementById('final-score').textContent = `${score} / ${questions.length}`;
        }

        function resetQuiz() {
            currentIndex = 0;
            score = 0;
            document.getElementById('quiz-ui').style.display = "block";
            document.getElementById('result-screen').style.display = "none";
            loadQuestion();
        }

        function updateProgress() {
            const percent = (currentIndex / questions.length) * 100;
            document.getElementById('progress-fill').style.width = percent + "%";
        }

        loadQuestion();
    </script>
</body>
</html>
