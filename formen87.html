<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: два oder две?</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .desc { color: #666; margin-bottom: 20px; line-height: 1.4; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.3s;
        }

        .noun-display {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 30px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            color: var(--primary-color);
        }

        .choice-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .choice-btn {
            padding: 20px;
            font-size: 1.5rem;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .choice-btn:hover:not(:disabled) {
            border-color: var(--accent-color);
            background: #f0f7ff;
        }

        .choice-btn.correct {
            background-color: var(--success-color) !important;
            border-color: var(--success-color) !important;
            color: white;
        }

        .choice-btn.wrong {
            background-color: var(--error-color) !important;
            border-color: var(--error-color) !important;
            color: white;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            margin-top: 20px;
        }

        button.action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 200px;
        }

        #solve-btn { background-color: #95a5a6; color: white; }
        #next-btn { background-color: var(--accent-color); color: white; display: none; }

        #feedback {
            height: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #result-screen { display: none; }
        .final-score { font-size: 3rem; color: var(--accent-color); margin: 20px 0; }
        #reset-btn { background-color: var(--primary-color); color: white; }

        @media (max-width: 400px) {
            .choice-btn { font-size: 1.2rem; }
            .noun-display { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container" id="quiz-ui">
        <h1>два oder две?</h1>
        <p class="desc">Wähle die richtige Form von „zwei“ für das angezeigte Wort.</p>
        
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>

        <div id="feedback"></div>

        <div class="noun-display" id="noun-display">стула</div>

        <div class="choice-container">
            <button class="choice-btn" onclick="checkAnswer('два')">два</button>
            <button class="choice-btn" onclick="checkAnswer('две')">две</button>
        </div>

        <div class="controls">
            <button id="solve-btn" class="action-btn" onclick="showSolution()">Lösung anzeigen</button>
            <button id="next-btn" class="action-btn" onclick="nextQuestion()">Weiter</button>
        </div>
    </div>

    <div class="container" id="result-screen">
        <h1>Ergebnis</h1>
        <p>Du hast die Übung abgeschlossen!</p>
        <div class="final-score" id="score-display">0 / 12</div>
        <button id="reset-btn" class="action-btn" onclick="resetGame()">Neu starten</button>
    </div>

    <script>
        const quizData = [
            { noun: "стула", correct: "два" },   // männlich
            { noun: "книги", correct: "две" },   // weiblich
            { noun: "окна", correct: "два" },    // sächlich
            { noun: "сумки", correct: "две" },   // weiblich
            { noun: "яблока", correct: "два" },  // sächlich
            { noun: "телефона", correct: "два" },// männlich
            { noun: "ручки", correct: "две" },   // weiblich
            { noun: "города", correct: "два" },  // männlich
            { noun: "машины", correct: "две" },  // weiblich
            { noun: "задания", correct: "два" }, // sächlich
            { noun: "билета", correct: "два" },  // männlich
            { noun: "ложки", correct: "две" }    // weiblich
        ];

        let currentIndex = 0;
        let score = 0;
        let answered = false;
        let firstTry = true;

        function loadQuestion() {
            answered = false;
            firstTry = true;
            const current = quizData[currentIndex];
            document.getElementById('noun-display').textContent = current.noun;
            document.getElementById('feedback').textContent = "";
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('solve-btn').style.display = "block";
            
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(btn => {
                btn.classList.remove('correct', 'wrong');
                btn.disabled = false;
            });

            updateProgress();
        }

        function checkAnswer(choice) {
            if (answered) return;
            
            const correctChoice = quizData[currentIndex].correct;
            const buttons = document.querySelectorAll('.choice-btn');
            let selectedBtn;
            
            buttons.forEach(btn => {
                if(btn.textContent === choice) selectedBtn = btn;
            });

            if (choice === correctChoice) {
                selectedBtn.classList.add('correct');
                if (firstTry) score++;
                document.getElementById('feedback').textContent = "Richtig!";
                document.getElementById('feedback').style.color = "var(--success-color)";
                endQuestion();
            } else {
                selectedBtn.classList.add('wrong');
                selectedBtn.disabled = true;
                firstTry = false;
                document.getElementById('feedback').textContent = "Versuch es nochmal!";
                document.getElementById('feedback').style.color = "var(--error-color)";
            }
        }

        function endQuestion() {
            answered = true;
            document.querySelectorAll('.choice-btn').forEach(btn => btn.disabled = true);
            document.getElementById('solve-btn').style.display = "none";
            document.getElementById('next-btn').style.display = "block";
        }

        function showSolution() {
            const correctChoice = quizData[currentIndex].correct;
            firstTry = false;
            document.querySelectorAll('.choice-btn').forEach(btn => {
                if (btn.textContent === correctChoice) {
                    btn.classList.add('correct');
                }
                btn.disabled = true;
            });
            document.getElementById('feedback').textContent = "Lösung: " + correctChoice;
            document.getElementById('feedback').style.color = "var(--primary-color)";
            endQuestion();
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < quizData.length) {
                loadQuestion();
            } else {
                showFinalResult();
            }
        }

        function showFinalResult() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('score-display').textContent = `${score} / ${quizData.length}`;
        }

        function resetGame() {
            currentIndex = 0;
            score = 0;
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            // Quizdaten mischen
            quizData.sort(() => Math.random() - 0.5);
            loadQuestion();
        }

        function updateProgress() {
            const percent = (currentIndex / quizData.length) * 100;
            document.getElementById('progress-fill').style.width = percent + "%";
        }

        // Initiale Mischung und Start
        quizData.sort(() => Math.random() - 0.5);
        loadQuestion();
    </script>
</body>
</html>
